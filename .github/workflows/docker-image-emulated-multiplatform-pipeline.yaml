name: 'Emulated: prepare → test → scan'
run-name: '${{ github.ref_type }}_${{ github.ref_name }}@${{ github.triggering_actor }}'

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      GEMINI_CLI_VERSION:
        description: 'GEMINI_CLI_VERSION'
        required: false
        type: string
        default: 'v0.52.0'
      CONTAINER_TAG:
        description: 'CONTAINER_TAG (text)'
        required: false
        type: string
        default: 'initial'

env:
  GH_REGISTRY: ghcr.io
  DH_REGISTRY: docker.io
  DHI_REGISTRY: dhi.io
  CONTAINER_TAG: initial

jobs:
  prepare:
    name: 'Preparation, cleanup'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      packages: write
    outputs:
      REPOSITORY_NAME: ${{ steps.params.outputs.REPOSITORY_NAME }}
      REPOSITORY_DESCRIPTION: ${{ steps.params.outputs.REPOSITORY_DESCRIPTION }}
      CONTAINER_TAG: ${{ steps.params.outputs.CONTAINER_TAG }}
      TIMESTAMP: ${{ steps.params.outputs.TIMESTAMP }}
      GEMINI_CLI_RELEASE_VERSION: ${{ steps.params.outputs.GEMINI_CLI_RELEASE_VERSION }}
    steps:
      - name: 'Checkout'
        uses: actions/checkout@main

      - name: 'Get repository description'
        id: repo
        uses: stefanbosak/gh-actions/get-repo-description@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Set parameters to GITHUB_ENV and GITHUB_OUTPUT'
        id: params
        env:
          CHANGES_JSON: ${{ toJson(github.event.client_payload.changes) }}
        run: |
          CONTAINER_TAG="${{ env.CONTAINER_TAG }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            GEMINI_CLI_RELEASE_VERSION="${{ github.event.inputs.GEMINI_CLI_VERSION }}"
            CONTAINER_TAG="${{ github.event.inputs.CONTAINER_TAG }}"
          fi
          REPOSITORY_NAME="$(echo '${{ github.repository }}' | cut -d'/' -f2)"
          REPOSITORY_DESCRIPTION="${{ steps.repo.outputs.description }}"
          TIMESTAMP="$(git log -1 --format=%cI)"
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            GEMINI_CLI_RELEASE_VERSION=$(echo "${CHANGES_JSON}" | jq -r '.[] | select(.repo == "gemini-cli") | .tag')
          fi
          echo "CONTAINER_TAG=${CONTAINER_TAG}" >> ${GITHUB_ENV}
          echo "REPOSITORY_NAME=${REPOSITORY_NAME}" >> ${GITHUB_ENV}
          echo "REPOSITORY_DESCRIPTION=${REPOSITORY_DESCRIPTION}" >> ${GITHUB_ENV}
          echo "TIMESTAMP=${TIMESTAMP}" >> ${GITHUB_ENV}
          echo "GEMINI_CLI_RELEASE_VERSION=${GEMINI_CLI_RELEASE_VERSION}" >> ${GITHUB_ENV}
          echo "GITHUB_ENV:"
          cat ${GITHUB_ENV}
          echo "CONTAINER_TAG=${CONTAINER_TAG}" >> ${GITHUB_OUTPUT}
          echo "REPOSITORY_NAME=${REPOSITORY_NAME}" >> ${GITHUB_OUTPUT}
          echo "REPOSITORY_DESCRIPTION=${REPOSITORY_DESCRIPTION}" >> ${GITHUB_OUTPUT}
          echo "TIMESTAMP=${TIMESTAMP}" >> ${GITHUB_OUTPUT}
          echo "GEMINI_CLI_RELEASE_VERSION=${GEMINI_CLI_RELEASE_VERSION}" >> ${GITHUB_OUTPUT}
          echo "GITHUB_OUTPUT:"
          cat ${GITHUB_OUTPUT}

      - name: 'Check GHCR package exists'
        id: pkg-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if count=$(gh api "/user/packages/container/${{ env.REPOSITORY_NAME }}/versions" --jq 'length' 2>/dev/null); then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "count=${count}" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "count=0" >> "${GITHUB_OUTPUT}"
          fi

      - name: 'Cleanup ${{ env.GH_REGISTRY }} registry'
        if: steps.pkg-check.outputs.exists == 'true' && steps.pkg-check.outputs.count != '0'
        uses: actions/delete-package-versions@main
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        with:
          owner: ${{ github.repository_owner }}
          package-name: ${{ env.REPOSITORY_NAME }}
          package-type: 'container'
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-only-untagged-versions: 'false'
          min-versions-to-keep: 5

      - name: 'Check GHCR package exists'
        id: pkg-cache-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if count=$(gh api "/user/packages/container/${{ env.REPOSITORY_NAME }}-cache/versions" --jq 'length' 2>/dev/null); then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "count=${count}" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "count=0" >> "${GITHUB_OUTPUT}"
          fi

      - name: 'Cleanup ${{ env.GH_REGISTRY }} registry'
        if: steps.pkg-cache-check.outputs.exists == 'true' && steps.pkg-cache-check.outputs.count != '0'
        uses: actions/delete-package-versions@main
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        with:
          owner: ${{ github.repository_owner }}
          package-name: '${{ env.REPOSITORY_NAME }}-cache'
          package-type: 'container'
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-only-untagged-versions: 'true'
          min-versions-to-keep: 2

      - name: 'Cleanup ${{ env.DH_REGISTRY }} registry'
        uses: stefanbosak/gh-actions/cleanup-dockerhub-old-digests@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}
          ref-name: ${{ github.ref_name }}
          dh-user: ${{ secrets.DH_USER }}
          dh-token: ${{ secrets.DH_TOKEN }}
          repository-name: ${{ env.REPOSITORY_NAME }}

  build:
    name: 'Prepare multi-platform Docker images'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-26.04]
    permissions:
      contents: read
      packages: write
    outputs:
      REPOSITORY_NAME: ${{ steps.params.outputs.REPOSITORY_NAME }}
      CONTAINER_TAG: ${{ steps.params.outputs.CONTAINER_TAG }}
    steps:
      - name: 'Checkout'
        uses: actions/checkout@main

      - name: 'Set up QEMU (arm64)'
        uses: docker/setup-qemu-action@master
        with:
          platforms: linux/arm64

      - name: 'Set up Docker buildx'
        uses: docker/setup-buildx-action@master
        with:
          version: latest
          driver-opts: |
            network=host
            image=moby/buildkit:master

      - name: 'Login to ${{ env.GH_REGISTRY }} registry'
        uses: docker/login-action@master
        with:
          registry: ${{ env.GH_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          ecr: false
          logout: true

      - name: 'Login to ${{ env.DH_REGISTRY }} registry'
        uses: docker/login-action@master
        with:
          registry: ${{ env.DH_REGISTRY }}
          username: ${{ secrets.DH_USER }}
          password: ${{ secrets.DH_TOKEN }}
          ecr: false
          logout: true

      - name: 'Login to ${{ env.DHI_REGISTRY }} registry'
        uses: docker/login-action@master
        with:
          registry: ${{ env.DHI_REGISTRY }}
          username: ${{ secrets.DH_USER }}
          password: ${{ secrets.DH_TOKEN }}
          ecr: false
          logout: true

      - name: 'Build, push'
        uses: docker/build-push-action@master
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          no-cache: false
          cache-from: type=registry,ref=${{ env.GH_REGISTRY }}/${{ github.repository }}-cache:build-qemu
          cache-to: type=registry,ref=${{ env.GH_REGISTRY }}/${{ github.repository }}-cache:build-qemu,mode=max
          github-token: ${{ secrets.GITHUB_TOKEN }}
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            GEMINI_CLI_RELEASE_VERSION=${{ needs.prepare.outputs.GEMINI_CLI_RELEASE_VERSION }}
          tags: |
            ${{ env.GH_REGISTRY }}/${{ github.repository }}:${{ env.CONTAINER_TAG }}
            ${{ env.DH_REGISTRY }}/${{ secrets.DH_USER }}/${{ env.REPOSITORY_NAME }}:${{ env.CONTAINER_TAG }}
          labels: |
            org.opencontainers.image.created=${{ env.TIMESTAMP }}
            org.opencontainers.image.description=${{ needs.prepare.outputs.REPOSITORY_DESCRIPTION }}
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          platforms: linux/amd64,linux/arm64
          outputs: |
            type=image,compression=gzip,compression-level=3,force-compression=true

      - name: 'Install cosign'
        uses: sigstore/cosign-installer@main

      - name: 'Sign multi-platform image index (${{ env.GH_REGISTRY }})'
        run: |
          IMAGE="${{ env.GH_REGISTRY }}/${{ github.repository }}:${{ needs.prepare.outputs.CONTAINER_TAG }}"
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}" --format '{{json .}}' | jq -r '.manifest.digest')
          cosign sign --yes "${IMAGE}@${DIGEST}"

  test:
    name: 'Test image (${{ matrix.platform_pair }})'
    needs: [prepare, build]
    if: success()
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-26.04
            platform: linux/amd64
            platform_pair: linux-amd64
          - runner: ubuntu-26.04-arm
            platform: linux/arm64
            platform_pair: linux-arm64
    permissions:
      contents: read
      packages: read
    outputs:
      GEMINI_CLI_VERSION: ${{ steps.test.outputs.GEMINI_CLI_VERSION }}
    steps:
      - name: 'Install cosign'
        uses: sigstore/cosign-installer@main

      - name: 'Verify image signature (${{ env.DH_REGISTRY }})'
        run: |
          IMAGE="${{ env.GH_REGISTRY }}/${{ github.repository }}:${{ needs.prepare.outputs.CONTAINER_TAG }}"
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}" --format '{{json .}}' | jq -r '.manifest.digest')
          cosign verify \
            --certificate-identity-regexp="https://github\.com/${{ github.repository }}/\.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${IMAGE}@${DIGEST}"

      - name: 'Run tests in Docker container'
        id: test
        run: |
          GEMINI_CLI_VERSION=$(docker run --rm \
            -v /dev:/dev \
            -u root \
            ${{ env.GH_REGISTRY }}/${{ github.repository }}:${{ needs.prepare.outputs.CONTAINER_TAG }} \
            sh -c 'gemini --version | awk "{print \$1}"')
          echo "GEMINI_CLI_VERSION=${GEMINI_CLI_VERSION}"
          docker run --rm \
            -v /dev:/dev \
            -u root \
            ${{ env.GH_REGISTRY }}/${{ github.repository }}:${{ needs.prepare.outputs.CONTAINER_TAG }} \
            sh -c 'v=$(docker --version | grep -oP "\d+\.\d+\.\d+(-\d+)?"); echo "DOCKER_CLI_VERSION=${v}";'
          if [[ "${{ matrix.platform_pair }}" == "linux-amd64" ]]; then
            echo "GEMINI_CLI_VERSION=${GEMINI_CLI_VERSION}" >> ${GITHUB_OUTPUT}
          fi

  scan:
    name: 'Scan image (${{ matrix.platform_pair }})'
    needs: [prepare, build]
    if: success()
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-26.04
            platform: linux/amd64
            platform_pair: linux-amd64
          - runner: ubuntu-26.04-arm
            platform: linux/arm64
            platform_pair: linux-arm64
    permissions:
      contents: read
      packages: read
    steps:
      - name: 'Checkout'
        uses: actions/checkout@main

      - name: 'Install cosign'
        uses: sigstore/cosign-installer@main

      - name: 'Verify image signature (${{ env.DH_REGISTRY }})'
        run: |
          IMAGE="${{ env.GH_REGISTRY }}/${{ github.repository }}:${{ needs.prepare.outputs.CONTAINER_TAG }}"
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}" --format '{{json .}}' | jq -r '.manifest.digest')
          cosign verify \
            --certificate-identity-regexp="https://github\.com/${{ github.repository }}/\.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${IMAGE}@${DIGEST}"

      - name: 'Run Trivy scan'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.GH_REGISTRY }}/${{ github.repository }}:${{ needs.prepare.outputs.CONTAINER_TAG }}'
          format: 'json'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          exit-code: '0'
          version: 'latest'
          output: scan-report-${{ matrix.runner }}.json

      - name: 'Store scan report as artifact'
        uses: actions/upload-artifact@main
        with:
          name: scan-report-${{ matrix.runner }}
          path: scan-report-${{ matrix.runner }}.json
          retention-days: 7
          overwrite: true
          compression-level: 0

  update-readme:
    name: 'Update README.md with version info'
    needs: [prepare, build, test]
    if: success()
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: 'Checkout'
        uses: actions/checkout@main

      - name: 'Update README.md version section'
        env:
          GEMINI_VERSION: ${{ needs.test.outputs.GEMINI_CLI_VERSION }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          export UPDATED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          python3 << 'PYEOF'
          import re, os
          gemini_version = os.environ['GEMINI_VERSION']
          updated_at = os.environ['UPDATED_AT']
          run_url = os.environ['RUN_URL']
          run_number = os.environ['RUN_NUMBER']
          new_section = (
              "<!-- VERSION_INFO_START -->\n"
              "| Component | Version |\n"
              "|-----------|---------|\n"
              f"| **Google Gemini CLI** | [`{gemini_version}`](https://github.com/google-gemini/gemini-cli/releases/tag/v{gemini_version}) |\n"
              "\n"
              f"> 🔄 Last updated: {updated_at} · [Build #{run_number}]({run_url})\n"
              "<!-- VERSION_INFO_END -->"
          )
          with open('README.md', 'r') as f:
              content = f.read()
          pattern = r'<!-- VERSION_INFO_START -->.*?<!-- VERSION_INFO_END -->'
          new_content = re.sub(pattern, new_section, content, flags=re.DOTALL)
          with open('README.md', 'w') as f:
              f.write(new_content)
          print('README.md updated successfully')

          var_defaults = {
              'GEMINI_CLI_VERSION':     os.environ['GEMINI_CLI_RELEASE_VERSION'],
          }
          pipeline_files = [
              '.github/workflows/docker-image-native-multiplatform-pipeline.yaml',
              '.github/workflows/docker-image-emulated-multiplatform-pipeline.yaml',
          ]
          for pf in pipeline_files:
              with open(pf, 'r') as f:
                  pf_content = f.read()
              for var_name, version in var_defaults.items():
                  if not version:
                      continue
                  pat = re.compile(
                      rf'([ \t]+{re.escape(var_name)}:\n(?:[ \t]+\S[^\n]*\n)*?[ \t]+type:[ \t]*string\n)'
                      r'([ \t]+default:[^\n]*\n)?'
                  )
                  def repl(m, ver=version):
                      block = m.group(1)
                      ind = re.search(r'^([ \t]+)type:', block, re.MULTILINE).group(1)
                      return block + f"{ind}default: '{ver}'\n"
                  pf_content = pat.sub(repl, pf_content)
              with open(pf, 'w') as f:
                  f.write(pf_content)
              print(f'{pf} updated successfully')
          PYEOF

      - name: 'Store version information'
        uses: stefanbosak/gh-actions/signed-verified-commit@main
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          signed-off: 'true'
          commit-message: 'chore: update version information'
          files: |
            README.md
            .github/workflows/docker-image-native-multiplatform-pipeline.yaml
            .github/workflows/docker-image-emulated-multiplatform-pipeline.yaml
