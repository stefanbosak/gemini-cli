name: 'Monitor Pre-Release'

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get latest pre-release from target repo
        id: latest
        uses: actions/github-script@main
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: 'google-gemini',
              repo: context.repo.repo,
              per_page: 10,
            });
            const prerelease = releases.find(r => r.prerelease);
            if (prerelease) {
              console.log(`Latest pre-release: ${prerelease.tag_name}`);
              core.setOutput('tag', prerelease.tag_name);
            } else {
              console.log('No pre-release found.');
              core.setOutput('tag', '');
            }

      # Restore with a prefix — always gets the most recently saved entry
      - name: Restore cached last-known pre-release
        uses: actions/cache/restore@main
        with:
          path: .last-prerelease
          key: last-known-prerelease-${{ github.run_id }}   # never matches (forces restore-keys lookup)
          restore-keys: last-known-prerelease-               # matches any previously saved entry

      - name: Read cached pre-release tag
        id: cached
        run: |
          if [ -f .last-prerelease ]; then
            echo "tag=$(cat .last-prerelease)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
          cat "$GITHUB_OUTPUT"

      - name: Compare and trigger downstream workflow
        if: steps.latest.outputs.tag != steps.cached.outputs.tag && steps.latest.outputs.tag != ''
        uses: actions/github-script@main
        with:
          script: |
            const tag = '${{ steps.latest.outputs.tag }}';
            const cachedTag = '${{ steps.cached.outputs.tag }}';
            console.log(`New pre-release detected: ${tag} (was: ${cachedTag})`);
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: `new-${context.repo.repo}-prerelease`,
              client_payload: { tag },
            });

      - name: Save latest pre-release tag
        if: steps.latest.outputs.tag != ''
        run: echo "${{ steps.latest.outputs.tag }}" > .last-prerelease

      # Save with a unique key each run — avoids the "already exists" conflict
      - name: Update cache
        uses: actions/cache/save@main
        if: steps.latest.outputs.tag != ''
        with:
          path: .last-prerelease
          key: last-known-prerelease-${{ github.run_id }}
